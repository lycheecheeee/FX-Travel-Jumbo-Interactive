<script>
// ============================================
// MODULE: Audio System
// ============================================
class AudioSystem {
  constructor() {
    this.audioCache = new Map();
  }
  
  /**
   * 获取智能音频路径
   */
  getAudioPath(filename) {
    const hostname = window.location.hostname;
    
    if (hostname.includes('github.io')) {
      return `/FX-Travel-Jumbo-Interactive/assets/sounds/${filename}`;
    } else if (hostname.includes('vercel.app') || hostname === 'localhost' || hostname === '127.0.0.1') {
      return `./assets/sounds/${filename}`;
    } else {
      return `./assets/sounds/${filename}`;
    }
  }
  
  /**
   * 播放音效
   */
  playSound(soundType, volume = 1.0) {
    try {
      const filename = soundType === 'hero' ? CONFIG.audioPaths.hero.split('/').pop() : CONFIG.audioPaths.bottom.split('/').pop();
      const audioPath = this.getAudioPath(filename);
      
      logger.log(`🔊 Playing ${soundType} sound from:`, audioPath);
      logger.log('🔍 Current hostname:', window.location.hostname);
      
      // 创建新的 Audio 实例
      const audio = new Audio(audioPath);
      audio.volume = volume;
      audio.preload = 'auto';
      
      // 错误处理
      audio.addEventListener('error', (e) => {
        logger.error(`❌ ${soundType} sound load error:`, e);
        logger.error('Error code:', audio.error ? audio.error.code : 'unknown');
      });
      
      // 播放
      audio.play().catch(error => {
        logger.warn(`⚠️ ${soundType} sound playback failed:`, error);
      });
      
      return audio;
    } catch (error) {
      logger.error(`❌ ${soundType} sound error:`, error);
      return null;
    }
  }
}

// ============================================
// MODULE: Speech Bubble Manager
// ============================================
class SpeechBubbleManager {
  constructor(bubbleElement) {
    this.bubble = bubbleElement;
    this.messages = [
      { greeting: '你好呀！', message: '我係外遊象寶，幫你輕鬆管理旅行開支！' },
      { greeting: '旅行開心啲！', message: '用我記賬，分帳超簡單～' },
      { greeting: '匯率即時睇！', message: '唔使再計數計到頭痕啦！' }
    ];
    this.currentIndex = 0;
    this.autoRotateTimer = null;
  }
  
  /**
   * 更新气泡文字（只更新textContent，不破坏DOM结构）
   */
  updateMessage(index) {
    if (!this.bubble) return;
    
    const msg = this.messages[index];
    const greetingDiv = this.bubble.querySelector('.speech-bubble-greeting');
    const messageDiv = this.bubble.querySelector('.speech-bubble-message');
    
    if (greetingDiv && messageDiv) {
      greetingDiv.innerHTML = msg.greeting;
      messageDiv.innerHTML = msg.message;
    }
  }
  
  /**
   * 切换到下一条消息
   */
  nextMessage() {
    this.currentIndex = (this.currentIndex + 1) % this.messages.length;
    this.updateMessage(this.currentIndex);
  }
  
  /**
   * 启动自动轮播
   */
  startAutoRotate(interval = 15000) {
    if (this.autoRotateTimer) clearInterval(this.autoRotateTimer);
    this.autoRotateTimer = setInterval(() => {
      this.nextMessage();
    }, interval);
  }
  
  /**
   * 停止自动轮播
   */
  stopAutoRotate() {
    if (this.autoRotateTimer) {
      clearInterval(this.autoRotateTimer);
      this.autoRotateTimer = null;
    }
  }
}

// ============================================
// MODULE: Jumbo Mascot Interactions
// ============================================
class JumboMascot {
  constructor(element, audioSystem, bubbleManager) {
    this.element = element;
    this.audio = audioSystem;
    this.bubble = bubbleManager;
    this.lastPlayTime = 0;
    
    this.init();
  }
  
  init() {
    // 点击事件
    this.element.addEventListener('click', () => {
      this.handleClick();
    });
    
    // 悬停事件（防抖）
    this.element.addEventListener('mouseenter', () => {
      this.handleMouseEnter();
    });
  }
  
  handleClick() {
    // 播放音效
    this.audio.playSound('bottom');
    
    // 切换气泡消息
    if (this.bubble) {
      this.bubble.nextMessage();
    }
    
    // Jumbo 弹跳动画
    this.element.style.transition = 'transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
    this.element.style.transform = 'scale(1.05) rotate(5deg)';
    
    setTimeout(() => {
      this.element.style.transform = 'scale(1) rotate(0deg)';
    }, 300);
  }
  
  handleMouseEnter() {
    const now = Date.now();
    if (now - this.lastPlayTime > 5000) {
      this.lastPlayTime = now;
      this.audio.playSound('bottom', 0.5); // 较低音量
    }
  }
}

// ============================================
// MODULE: Application Initialization
// ============================================
class App {
  constructor() {
    this.audioSystem = new AudioSystem();
    this.init();
  }
  
  init() {
    logger.log('🚀 App initializing...');
    logger.log('📦 Version:', CONFIG.version);
    logger.log('📅 Build:', CONFIG.buildDate);
    
    // 初始化 Speech Bubble
    const bubbleElement = document.getElementById('heroSpeechBubble');
    const bubbleManager = new SpeechBubbleManager(bubbleElement);
    
    // 初始化 Jumbo Mascot
    const jumboElement = document.getElementById('heroJumboMascot');
    const jumbo = new JumboMascot(jumboElement, this.audioSystem, bubbleManager);
    
    // 启动自动轮播
    bubbleManager.startAutoRotate(15000);
    
    logger.log('✅ App initialized successfully');
  }
}

// 页面加载完成后启动应用
document.addEventListener('DOMContentLoaded', () => {
  window.app = new App();
});
</script>
